<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
    <h1 id="title">Survey Form</h1>
    <p id="description">Please fill out this survey to help us improve our services.</p>
    <form id="survey-form">
        <label id="name-label" for="name">Name:</label>
        <input id="name" type="text" placeholder="Enter your name" required><br/>
        <label id="email-label" for="email">Email:</label>
        <input id="email" type="email" placeholder="Enter your email" required><br/>
        <label id="number-label" for="number">Age:</label>
        <input id="number" type="number" min="1" max="10" placeholder="Enter your age" required ><br/>
        <label id="dropdown-label" for="dropdown">Gender:</label>
        <select id="dropdown">
            <option value="">Select an option</option>
            <option value="option1">Man</option>
            <option value="option2">Woman</option>
            <option value="option3">Other</option>
        </select><br/>
            <label id="radio-label" for="like">Do you like our services?</label><br/>
            <input type="radio" id="yes" name="like" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="like" value="no">
            <label for="no">No</label><br/>
        
            <label id="checkbox-label" for="choice">Would you recommend us to a friend?</label><br/>
            <input type="checkbox" id="yes-choice" name="choice" value="yes">
            <label for="yes-choice">Yes</label>
            <input type="checkbox" id="no-choice" name="choice" value="no">
            <label for="no-choice">No</label><br/>
            <textarea id="comments" placeholder="Any Comments" cols="30" rows="10"></textarea><br/>
            <button id="submit" type="submit">Submit</button>
    </form>
</body>
</html>
